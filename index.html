<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泡泡雲端便利貼 - Boardy Premium</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts & FontAwesome for Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    // 配置 Tailwind 支援 class 類比深色模式與自訂可愛風主題
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            cute: {
              cream: '#fffdf9',
              dark: '#1e1b2e',
              pink: '#ffb7b2',
              peach: '#ffdac1',
              yellow: '#e2f0cb',
              green: '#b5ead7',
              purple: '#c7ceea'
            }
          },
          borderRadius: {
            'bubble': '1.5rem',
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
      background-color: #fffdf9;
      background-image: radial-gradient(#ffd5cd 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      transition: background-color 0.4s, background-image 0.4s;
    }
    
    /* 深色模式下的俏皮底圖 */
    .dark body {
      background-color: #12101d;
      background-image: radial-gradient(#3a3554 1.5px, transparent 1.5px);
    }

    /* 泡泡 Q 彈懸浮動畫 */
    .bouncy-btn {
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .bouncy-btn:hover {
      transform: translateY(-3px) scale(1.05);
    }
    .bouncy-btn:active {
      transform: translateY(1px) scale(0.95);
    }

    /* 可愛便利貼陰影與變形 */
    .note-card {
      border-radius: 1.5rem;
      border: 3px solid #1e1b2e;
      box-shadow: 6px 6px 0px 0px #1e1b2e;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.3s;
    }
    .dark .note-card {
      border: 3px solid #fefaf6;
      box-shadow: 6px 6px 0px 0px #fefaf6;
    }
    .note-card:active {
      transform: scale(1.03) rotate(2deg) !important;
      z-index: 50 !important;
    }

    /* 自訂捲軸樣式，更圓潤可愛 */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #ffb7b2;
      border-radius: 99px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #5b5475;
    }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col select-none text-slate-800 dark:text-slate-100">

  <!-- 頂部導航列 (可愛圓角邊框) -->
  <header class="bg-white dark:bg-[#181524] border-b-4 border-slate-800 dark:border-slate-100 px-6 py-3 flex justify-between items-center z-40 shrink-0">
    <div class="flex items-center gap-3">
      <!-- Q版可愛 Logo -->
      <div class="bg-gradient-to-tr from-rose-300 to-amber-200 text-slate-800 p-2 rounded-2xl border-3 border-slate-800 rotate-6 shadow-md">
        <i class="fa-solid fa-cloud-sun text-2xl animate-bounce"></i>
      </div>
      <div>
        <h1 class="text-2xl font-black text-slate-800 dark:text-white tracking-wide">Boardy 泡泡便利貼</h1>
        <p class="text-[11px] text-pink-500 dark:text-pink-400 font-bold tracking-widest uppercase">✨ Soft &amp; Sweet Workspace ✨</p>
      </div>
    </div>

    <!-- 功能與帳號控制區 -->
    <div id="auth-section" class="flex items-center gap-3">
      <!-- 日夜切換開關 -->
      <button onclick="toggleDarkMode()" class="bouncy-btn w-11 h-11 bg-amber-100 dark:bg-indigo-950 text-amber-500 dark:text-indigo-300 rounded-full border-3 border-slate-800 dark:border-slate-100 flex items-center justify-center text-lg" title="切換日夜模式">
        <i id="theme-icon" class="fa-solid fa-sun"></i>
      </button>

      <!-- 載入中 -->
      <div id="auth-loading" class="text-xs font-bold text-gray-500 flex items-center gap-2">
        <i class="fas fa-spinner fa-spin"></i> 同步中...
      </div>
      
      <!-- 未登入狀態 -->
      <div id="auth-logged-out" class="hidden flex items-center gap-2">
        <button onclick="openAuthModal('login')" class="px-4 py-2 text-sm font-bold text-slate-700 dark:text-slate-200 hover:text-pink-500 transition">
          登入
        </button>
        <button onclick="openAuthModal('register')" class="bouncy-btn px-4 py-2 text-sm font-black text-slate-800 bg-cute-pink rounded-xl border-3 border-slate-800 shadow-[3px_3px_0px_0px_rgba(30,27,46,1)]">
          註冊帳號
        </button>
      </div>

      <!-- 已登入狀態 -->
      <div id="auth-logged-in" class="hidden flex items-center gap-4">
        <div class="text-right hidden md:block">
          <p id="user-display-email" class="text-xs font-black text-slate-700 dark:text-slate-200"></p>
          <span class="text-[9px] bg-emerald-100 dark:bg-emerald-950 text-emerald-600 dark:text-emerald-300 px-2 py-0.5 rounded-full font-bold border border-emerald-300 dark:border-emerald-800">雲端同步中</span>
        </div>
        <button onclick="handleLogout()" class="bouncy-btn w-10 h-10 bg-rose-100 dark:bg-rose-950 text-rose-500 rounded-xl border-3 border-slate-800 dark:border-slate-100 flex items-center justify-center" title="登出">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- 工具列 (奶油黃俏皮背景) -->
  <div class="bg-amber-50 dark:bg-[#1f1a30] border-b-4 border-slate-800 dark:border-slate-100 px-6 py-4 flex flex-wrap justify-between items-center gap-4 z-30 shrink-0">
    <div class="flex items-center gap-3">
      <button onclick="createNewNote()" class="bouncy-btn flex items-center gap-2 px-5 py-2.5 bg-sky-200 dark:bg-sky-950 hover:bg-sky-300 text-slate-800 dark:text-slate-100 font-bold text-sm rounded-xl border-3 border-slate-800 dark:border-slate-100 shadow-[4px_4px_0px_0px_rgba(30,27,46,1)] dark:shadow-[4px_4px_0px_0px_rgba(255,255,255,1)]">
        <i class="fa-solid fa-wand-magic-sparkles text-pink-500"></i> 新增俏皮貼
      </button>
      <button onclick="reorganizeNotes()" class="bouncy-btn flex items-center gap-2 px-4 py-2.5 bg-purple-200 dark:bg-purple-950 text-slate-800 dark:text-slate-100 font-bold text-sm rounded-xl border-3 border-slate-800 dark:border-slate-100 shadow-[4px_4px_0px_0px_rgba(30,27,46,1)]" title="自動整齊排列所有便利貼">
        <i class="fa-solid fa-shapes"></i> 整理版面
      </button>
    </div>
    
    <!-- 快速調色盤 -->
    <div class="flex items-center gap-3 bg-white dark:bg-[#2c2642] px-4 py-2 rounded-2xl border-3 border-slate-800 dark:border-slate-100 shadow-[3px_3px_0px_0px_rgba(30,27,46,1)]">
      <span class="text-xs font-black text-slate-700 dark:text-slate-200 tracking-wider">直接建立：</span>
      <div class="flex gap-2">
        <button onclick="createNewNote('#ffb7b2')" class="w-7 h-7 rounded-full bg-[#ffb7b2] border-2 border-slate-800 hover:scale-120 transition" title="草莓粉"></button>
        <button onclick="createNewNote('#ffdac1')" class="w-7 h-7 rounded-full bg-[#ffdac1] border-2 border-slate-800 hover:scale-120 transition" title="蜜桃橘"></button>
        <button onclick="createNewNote('#e2f0cb')" class="w-7 h-7 rounded-full bg-[#e2f0cb] border-2 border-slate-800 hover:scale-120 transition" title="哈密瓜黃綠"></button>
        <button onclick="createNewNote('#b5ead7')" class="w-7 h-7 rounded-full bg-[#b5ead7] border-2 border-slate-800 hover:scale-120 transition" title="薄荷綠"></button>
        <button onclick="createNewNote('#c7ceea')" class="w-7 h-7 rounded-full bg-[#c7ceea] border-2 border-slate-800 hover:scale-120 transition" title="薰衣草紫"></button>
      </div>
    </div>
  </div>

  <!-- 主畫布 (便利貼置放區) -->
  <main id="board" class="flex-1 relative overflow-auto p-8">
    <!-- 當沒有便利貼時的引導畫面 (超可愛雲朵怪獸) -->
    <div id="empty-state" class="hidden absolute inset-0 flex flex-col justify-center items-center text-center p-6 pointer-events-none">
      <div class="w-24 h-24 bg-pink-100 text-pink-400 rounded-full flex items-center justify-center mb-4 border-4 border-slate-800 animate-pulse">
        <i class="fa-solid fa-face-smile-wink text-4xl"></i>
      </div>
      <h3 class="text-xl font-black text-slate-800 dark:text-white">點擊上方按鈕，寫下悄悄話！</h3>
      <p class="text-xs font-bold text-pink-500 dark:text-pink-400 max-w-sm mt-2">隨意拖曳、變換各種字體大小與繽紛配色吧 🍧</p>
    </div>

    <!-- 便利貼動態渲染區 -->
    <div id="notes-container" class="absolute inset-0 min-w-[1600px] min-h-[1600px]"></div>
  </main>

  <!-- 浮動訊息提示元件 -->
  <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 border-3 border-slate-800 px-6 py-3 rounded-full shadow-[4px_4px_0px_0px_rgba(30,27,46,1)] flex items-center gap-3 transition-all duration-300 translate-y-28 opacity-0 z-50">
    <i class="fa-solid fa-star text-amber-400"></i>
    <span id="toast-message" class="text-xs font-bold"></span>
  </div>

  <!-- Auth 燈箱 (註冊 / 登入) -->
  <div id="auth-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white dark:bg-[#1c1929] rounded-bubble max-w-md w-full p-8 border-4 border-slate-800 dark:border-slate-100 shadow-[10px_10px_0px_0px_rgba(30,27,46,1)] relative">
      <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition">
        <i class="fa-solid fa-circle-xmark text-2xl"></i>
      </button>
      
      <div class="text-center mb-6">
        <div class="inline-flex bg-pink-100 dark:bg-pink-950 text-pink-500 dark:text-pink-300 p-4 rounded-full border-3 border-slate-800 mb-3 rotate-6">
          <i id="modal-icon" class="fa-solid fa-id-card text-2xl"></i>
        </div>
        <h2 id="modal-title" class="text-2xl font-black text-slate-800 dark:text-white">建立個人帳號</h2>
        <p id="modal-desc" class="text-xs text-pink-500 dark:text-pink-400 font-bold mt-1.5">建立帳號以在任何裝置同步您的個人便利貼。</p>
      </div>

      <form id="auth-form" onsubmit="handleAuthSubmit(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-black text-slate-700 dark:text-slate-300 uppercase tracking-wider mb-1.5">電子郵件信箱</label>
          <input type="email" id="auth-email" required class="w-full px-4 py-2.5 bg-gray-50 dark:bg-[#252236] border-3 border-slate-800 dark:border-slate-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-pink-300 focus:bg-white dark:focus:bg-[#2c293f] transition" placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-xs font-black text-slate-700 dark:text-slate-300 uppercase tracking-wider mb-1.5">設定密碼</label>
          <input type="password" id="auth-password" required minlength="6" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-[#252236] border-3 border-slate-800 dark:border-slate-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-pink-300 focus:bg-white dark:focus:bg-[#2c293f] transition" placeholder="至少 6 位字元">
        </div>

        <button type="submit" id="auth-submit-btn" class="bouncy-btn w-full py-3 bg-cute-pink hover:bg-pink-400 text-slate-800 font-black rounded-xl border-3 border-slate-800 shadow-[4px_4px_0px_0px_rgba(30,27,46,1)] transition duration-200 mt-2">
          註冊帳號
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-slate-100 dark:border-slate-800 text-center text-sm">
        <span id="modal-switch-text" class="text-gray-500 font-bold">已經有帳號了嗎？</span>
        <button onclick="switchAuthMode()" id="modal-switch-btn" class="text-pink-500 font-black hover:underline ml-1">
          立即登入
        </button>
      </div>
    </div>
  </div>

  <!-- FIREBASE 關鍵 SDK 引用 (V11+) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged, 
      signInWithCustomToken, 
      signInAnonymously,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { 
      getFirestore, 
      collection, 
      doc, 
      setDoc, 
      addDoc, 
      updateDoc, 
      deleteDoc, 
      query, 
      onSnapshot 
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // =========================================================================
    // FIREBASE 初始化設定區
    // =========================================================================
   const firebaseConfig = {
  apiKey: "AIzaSyB3HUJ2BU1RXsvUeR6gAm1e2Nz4R7F8zRI",
  authDomain: "classroom-lottery.firebaseapp.com",
  projectId: "classroom-lottery",
  storageBucket: "classroom-lottery.firebasestorage.app",
  messagingSenderId: "100958995507",
  appId: "1:100958995507:web:8ce1769021b0998b150f46"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-sticky-notes';

    // 全域變數
    let currentUser = null;
    let notesList = [];
    let unsubscribeNotes = null;
    let dragNoteId = null;
    let dragOffset = { x: 0, y: 0 };
    let currentAuthMode = 'register'; // 'register' 或 'login'

    // 常規便利貼預設調色盤 (可愛粉嫩風)
    const colors = [
      { bg: '#ffb7b2', border: '#ff9aa2', text: '#5a2225', title: '草莓粉' },
      { bg: '#ffdac1', border: '#ffbfa3', text: '#5a3d22', title: '蜜桃橘' },
      { bg: '#e2f0cb', border: '#c7e990', text: '#3c5a22', title: '哈密瓜黃綠' },
      { bg: '#b5ead7', border: '#8ee0c2', text: '#15523b', title: '薄荷綠' },
      { bg: '#c7ceea', border: '#a5b1e1', text: '#212a52', title: '薰衣草紫' }
    ];

    // 字型大小循環列表 (14px, 18px, 24px, 32px)
    const fontSizes = ["14px", "18px", "24px", "32px"];

    // =========================================================================
    // UI 元件互動函數與對應全域掛載
    // =========================================================================
    window.showToast = function(message, duration = 3000) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-message');
      toastMsg.innerText = message;
      toast.classList.remove('translate-y-28', 'opacity-0');
      
      setTimeout(() => {
        toast.classList.add('translate-y-28', 'opacity-0');
      }, duration);
    };

    // 日夜模式切換
    window.toggleDarkMode = function() {
      const htmlClass = document.documentElement.classList;
      const themeIcon = document.getElementById('theme-icon');
      if (htmlClass.contains('dark')) {
        htmlClass.remove('dark');
        themeIcon.className = "fa-solid fa-sun";
        localStorage.setItem('theme', 'light');
        showToast("切換為日光可愛模式 🍓");
      } else {
        htmlClass.add('dark');
        themeIcon.className = "fa-solid fa-moon";
        localStorage.setItem('theme', 'dark');
        showToast("切換為星夜俏皮模式 🌙");
      }
    };

    // 載入預設主題
    function loadSavedTheme() {
      const savedTheme = localStorage.getItem('theme');
      const themeIcon = document.getElementById('theme-icon');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        if (themeIcon) themeIcon.className = "fa-solid fa-moon";
      } else {
        document.documentElement.classList.remove('dark');
        if (themeIcon) themeIcon.className = "fa-solid fa-sun";
      }
    }

    window.openAuthModal = function(mode = 'register') {
      currentAuthMode = mode;
      const modal = document.getElementById('auth-modal');
      const title = document.getElementById('modal-title');
      const desc = document.getElementById('modal-desc');
      const submitBtn = document.getElementById('auth-submit-btn');
      const switchText = document.getElementById('modal-switch-text');
      const switchBtn = document.getElementById('modal-switch-btn');
      const icon = document.getElementById('modal-icon');

      modal.classList.remove('hidden');

      if (mode === 'register') {
        title.innerText = '建立個人帳號';
        desc.innerText = '在各電腦或手機登入此帳號，即可隨時讀取、編輯相同便利貼。';
        submitBtn.innerText = '建立帳號';
        switchText.innerText = '已經有帳號了嗎？';
        switchBtn.innerText = '立即登入';
        icon.className = 'fa-solid fa-user-plus text-2xl';
      } else {
        title.innerText = '歡迎回來 Boardy';
        desc.innerText = '登入帳號以同步載入你先前保存的便利貼內容。';
        submitBtn.innerText = '登入雲端';
        switchText.innerText = '還沒有個人帳號嗎？';
        switchBtn.innerText = '免費註冊';
        icon.className = 'fa-solid fa-right-to-bracket text-2xl';
      }
    };

    window.closeAuthModal = function() {
      document.getElementById('auth-modal').classList.add('hidden');
      document.getElementById('auth-form').reset();
    };

    window.switchAuthMode = function() {
      openAuthModal(currentAuthMode === 'register' ? 'login' : 'register');
    };

    // =========================================================================
    // FIREBASE 帳號驗證處理機制
    // =========================================================================
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("驗證初始化失敗:", err);
        showToast("雲端連線失敗，將以暫存模式運作");
      }
    };

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      const loadingEl = document.getElementById('auth-loading');
      const loggedOutEl = document.getElementById('auth-logged-out');
      const loggedInEl = document.getElementById('auth-logged-in');
      const emailDisplay = document.getElementById('user-display-email');

      loadingEl.classList.add('hidden');

      if (user) {
        if (user.isAnonymous) {
          emailDisplay.innerText = "訪客 (匿名)";
          loggedOutEl.classList.remove('hidden');
          loggedInEl.classList.add('hidden');
        } else {
          emailDisplay.innerText = user.email;
          loggedOutEl.classList.add('hidden');
          loggedInEl.classList.remove('hidden');
        }
        setupNotesListener(user.uid);
      } else {
        loggedOutEl.classList.remove('hidden');
        loggedInEl.classList.add('hidden');
        if (unsubscribeNotes) {
          unsubscribeNotes();
          unsubscribeNotes = null;
        }
        renderNotes([]);
      }
    });

    window.handleAuthSubmit = async function(e) {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;

      try {
        if (currentAuthMode === 'register') {
          await createUserWithEmailAndPassword(auth, email, password);
          showToast("帳號建立成功！已為你開啟同步雲端畫布 🍭");
        } else {
          await signInWithEmailAndPassword(auth, email, password);
          showToast("歡迎登入！正在載入您的專屬便利貼...");
        }
        closeAuthModal();
      } catch (err) {
        console.error("驗證錯誤:", err);
        let errorMsg = "操作失敗，請重試";
        if (err.code === 'auth/email-already-in-use') errorMsg = "此 Email 已被註冊，請直接登入";
        if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') errorMsg = "密碼錯誤";
        showToast(errorMsg);
      }
    };

    window.handleLogout = async function() {
      try {
        await signOut(auth);
        showToast("已成功登出。");
        await signInAnonymously(auth);
      } catch (err) {
        showToast("登出失敗，請重試");
      }
    };

    // =========================================================================
    // FIRESTORE 資料庫操作邏輯
    // =========================================================================
    function setupNotesListener(uid) {
      if (unsubscribeNotes) unsubscribeNotes();

      const notesCollectionRef = collection(db, 'artifacts', appId, 'users', uid, 'notes');

      unsubscribeNotes = onSnapshot(notesCollectionRef, 
        (snapshot) => {
          const notes = [];
          snapshot.forEach((doc) => {
            notes.push({ id: doc.id, ...doc.data() });
          });
          
          notes.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
          notesList = notes;
          renderNotes(notes);
        },
        (error) => {
          console.error("監聽 Firestore 失敗:", error);
        }
      );
    }

    window.createNewNote = async function(colorHex = null) {
      if (!currentUser) {
        showToast("尚未完成初始化連線");
        return;
      }

      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      const bg = colorHex || randomColor.bg;
      
      const containerWidth = document.getElementById('board').clientWidth;
      const x = Math.max(20, Math.floor(Math.random() * (containerWidth - 300)));
      const y = Math.max(20, Math.floor(Math.random() * 250) + 20);
      const angle = (Math.random() * 6 - 3).toFixed(1); 
      
      const newNote = {
        text: "寫點什麼...",
        x: x,
        y: y,
        bgColor: bg,
        fontSize: "18px", // 預設適中大小
        angle: parseFloat(angle),
        createdAt: Date.now()
      };

      try {
        const notesCollectionRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'notes');
        await addDoc(notesCollectionRef, newNote);
      } catch (err) {
        console.error("新增失敗:", err);
      }
    };

    window.deleteNote = async function(noteId) {
      if (!currentUser) return;
      try {
        const noteDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'notes', noteId);
        await deleteDoc(noteDocRef);
        showToast("已刪除便利貼 🌸");
      } catch (err) {
        console.error("刪除失敗:", err);
      }
    };

    let updateTimeoutMap = {};
    window.updateNoteText = function(noteId, text) {
      if (!currentUser) return;
      if (updateTimeoutMap[noteId]) clearTimeout(updateTimeoutMap[noteId]);

      updateTimeoutMap[noteId] = setTimeout(async () => {
        try {
          const noteDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'notes', noteId);
          await updateDoc(noteDocRef, { text: text });
        } catch (err) {
          console.error("文字更新失敗:", err);
        }
      }, 400);
    };

    window.updateNoteColor = async function(noteId, colorHex) {
      if (!currentUser) return;
      try {
        const noteDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'notes', noteId);
        await updateDoc(noteDocRef, { bgColor: colorHex });
      } catch (err) {
        console.error("顏色修改失敗:", err);
      }
    };

    // 字型大小循環切換邏輯
    window.cycleNoteFontSize = async function(noteId, currentSize) {
      if (!currentUser) return;
      const currentIndex = fontSizes.indexOf(currentSize || "18px");
      const nextIndex = (currentIndex + 1) % fontSizes.length;
      const nextSize = fontSizes[nextIndex];
      
      try {
        const noteDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'notes', noteId);
        await updateDoc(noteDocRef, { fontSize: nextSize });
        showToast(`文字大小已調整：${nextSize}`);
      } catch (err) {
        console.error("字型大小調整失敗:", err);
      }
    };

    window.updateNotePosition = async function(noteId, x, y) {
      if (!currentUser) return;
      try {
        const noteDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'notes', noteId);
        await updateDoc(noteDocRef, { x: Math.max(0, x), y: Math.max(0, y) });
      } catch (err) {
        console.error("位置更新失敗:", err);
      }
    };

    window.reorganizeNotes = async function() {
      if (!currentUser || notesList.length === 0) return;
      
      showToast("正在排排站...🧹");
      const cols = Math.min(Math.floor(document.getElementById('board').clientWidth / 280), 5) || 1;
      const startX = 40;
      const startY = 40;
      const gapX = 260;
      const gapY = 270;

      for (let i = 0; i < notesList.length; i++) {
        const note = notesList[i];
        const row = Math.floor(i / cols);
        const col = i % cols;
        const targetX = startX + col * gapX;
        const targetY = startY + row * gapY;

        try {
          const noteDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'notes', note.id);
          await updateDoc(noteDocRef, { x: targetX, y: targetY, angle: 0 });
        } catch (err) {
          console.error("重排失敗:", err);
        }
      }
    };

    // =========================================================================
    // UI 渲染與 DOM 操作
    // =========================================================================
    function renderNotes(notes) {
      const container = document.getElementById('notes-container');
      const emptyState = document.getElementById('empty-state');
      
      if (notes.length === 0) {
        emptyState.classList.remove('hidden');
        container.innerHTML = '';
        return;
      } else {
        emptyState.classList.add('hidden');
      }

      const currentActiveElement = document.activeElement;
      const activeNoteId = currentActiveElement?.dataset?.noteId;
      const activeSelectionStart = currentActiveElement?.selectionStart;
      const activeSelectionEnd = currentActiveElement?.selectionEnd;

      notes.forEach((note) => {
        let noteEl = document.getElementById(`note-${note.id}`);
        const isCurrentlyEditing = activeNoteId === note.id;

        if (!noteEl) {
          noteEl = document.createElement('div');
          noteEl.id = `note-${note.id}`;
          noteEl.className = "note-card group absolute w-60 h-64 p-4 flex flex-col cursor-move";
          
          noteEl.innerHTML = `
            <!-- 頂部控制列 -->
            <div class="note-header flex justify-between items-center mb-2 select-none handle">
              <div class="flex gap-1 md:opacity-0 group-hover:opacity-100 note-colors transition duration-200">
                <!-- 動態注入調色盤 -->
              </div>
              <div class="flex gap-2 items-center">
                <!-- 自訂字型大小按鈕 -->
                <button class="size-btn text-slate-800/60 hover:text-pink-600 transition" title="切換字體大小">
                  <i class="fa-solid fa-font text-xs"></i>
                </button>
                <button class="delete-btn text-slate-800/60 hover:text-red-500 transition" title="刪除">
                  <i class="fa-solid fa-circle-xmark"></i>
                </button>
              </div>
            </div>
            
            <!-- 內文編輯區 -->
            <textarea 
              data-note-id="${note.id}"
              class="note-textarea flex-1 bg-transparent border-none resize-none focus:outline-none focus:ring-0 font-bold leading-relaxed placeholder:text-slate-800/40"
              placeholder="開始輸入靈感..."
            ></textarea>
            
            <!-- 底部裝飾星星與時間 -->
            <div class="flex justify-between items-center text-[10px] text-slate-800/40 mt-1 select-none pointer-events-none font-bold">
              <i class="fa-solid fa-star text-amber-400"></i>
              <span>${new Date(note.createdAt || Date.now()).toLocaleDateString()}</span>
            </div>
          `;
          
          container.appendChild(noteEl);

          // 綁定事件監聽
          const textarea = noteEl.querySelector('.note-textarea');
          textarea.addEventListener('input', (e) => updateNoteText(note.id, e.target.value));

          const deleteBtn = noteEl.querySelector('.delete-btn');
          deleteBtn.addEventListener('click', () => deleteNote(note.id));

          // 綁定字體切換按鈕事件
          const sizeBtn = noteEl.querySelector('.size-btn');
          sizeBtn.addEventListener('click', () => {
            const latestNoteData = notesList.find(n => n.id === note.id);
            cycleNoteFontSize(note.id, latestNoteData?.fontSize || "18px");
          });

          // 注入圓點顏色更換
          const colorsDiv = noteEl.querySelector('.note-colors');
          colors.forEach(c => {
            const colorDot = document.createElement('button');
            colorDot.className = "w-3 h-3 rounded-full border border-slate-800/30 hover:scale-125 transition";
            colorDot.style.backgroundColor = c.bg;
            colorDot.title = c.title;
            colorDot.addEventListener('click', () => updateNoteColor(note.id, c.bg));
            colorsDiv.appendChild(colorDot);
          });

          setupDragAndDrop(noteEl, note.id);
        }

        // 動態套用位置、傾斜角與背景顏色
        noteEl.style.left = `${note.x}px`;
        noteEl.style.top = `${note.y}px`;
        noteEl.style.backgroundColor = note.bgColor || '#ffb7b2';
        noteEl.style.transform = `rotate(${note.angle || 0}deg)`;
        
        const textarea = noteEl.querySelector('.note-textarea');
        textarea.style.color = getTextColorByBg(note.bgColor || '#ffb7b2');
        
        // 自訂套用字型大小 (輕巧, 適中, 放大, 特大)
        textarea.style.fontSize = note.fontSize || '18px';

        if (!isCurrentlyEditing) {
          textarea.value = note.text || '';
        }
      });

      // 移除已刪除的 DOM
      const existingCards = container.querySelectorAll('.note-card');
      existingCards.forEach(card => {
        const id = card.id.replace('note-', '');
        if (!notes.find(n => n.id === id)) {
          card.remove();
        }
      });

      // 保留原本輸入的位置和焦點
      if (activeNoteId) {
        const activeTextarea = document.querySelector(`textarea[data-note-id="${activeNoteId}"]`);
        if (activeTextarea) {
          activeTextarea.focus();
          try {
            activeTextarea.setSelectionRange(activeSelectionStart, activeSelectionEnd);
          } catch(e) {}
        }
      }
    }

    function getTextColorByBg(bgColor) {
      const match = colors.find(c => c.bg.toLowerCase() === bgColor.toLowerCase());
      return match ? match.text : '#1e1b2e';
    }

    // =========================================================================
    // 拖曳 (Drag & Drop) 功能整合
    // =========================================================================
    function setupDragAndDrop(element, noteId) {
      element.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'TEXTAREA' || e.target.closest('button')) return;
        
        e.preventDefault();
        dragNoteId = noteId;
        
        document.querySelectorAll('.note-card').forEach(card => card.style.zIndex = '10');
        element.style.zIndex = '40';

        const rect = element.getBoundingClientRect();
        
        dragOffset.x = e.clientX - rect.left;
        dragOffset.y = e.clientY - rect.top;

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });

      element.addEventListener('touchstart', (e) => {
        if (e.target.tagName === 'TEXTAREA' || e.target.closest('button')) return;
        
        dragNoteId = noteId;
        document.querySelectorAll('.note-card').forEach(card => card.style.zIndex = '10');
        element.style.zIndex = '40';

        const touch = e.touches[0];
        const rect = element.getBoundingClientRect();
        
        dragOffset.x = touch.clientX - rect.left;
        dragOffset.y = touch.clientY - rect.top;

        document.addEventListener('touchmove', onTouchMove, { passive: false });
        document.addEventListener('touchend', onTouchEnd);
      });

      function onMouseMove(e) {
        if (dragNoteId !== noteId) return;
        moveElement(e.clientX, e.clientY);
      }

      function onTouchMove(e) {
        if (dragNoteId !== noteId) return;
        e.preventDefault(); 
        const touch = e.touches[0];
        moveElement(touch.clientX, touch.clientY);
      }

      function moveElement(clientX, clientY) {
        const board = document.getElementById('board');
        const boardRect = board.getBoundingClientRect();
        
        const x = clientX - boardRect.left - dragOffset.x + board.scrollLeft;
        const y = clientY - boardRect.top - dragOffset.y + board.scrollTop;

        element.style.left = `${Math.max(0, x)}px`;
        element.style.top = `${Math.max(0, y)}px`;
      }

      function onMouseUp() {
        if (dragNoteId === noteId) {
          const finalX = parseInt(element.style.left);
          const finalY = parseInt(element.style.top);
          updateNotePosition(noteId, finalX, finalY);
          dragNoteId = null;
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
        }
      }

      function onTouchEnd() {
        if (dragNoteId === noteId) {
          const finalX = parseInt(element.style.left);
          const finalY = parseInt(element.style.top);
          updateNotePosition(noteId, finalX, finalY);
          dragNoteId = null;
          document.removeEventListener('touchmove', onTouchMove);
          document.removeEventListener('touchend', onTouchEnd);
        }
      }
    }

    // =========================================================================
    // 網頁啟動初始化
    // =========================================================================
    window.onload = function() {
      loadSavedTheme();
      initAuth();
    };

  </script>
</body>
</html>
